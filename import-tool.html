function log(msg,cls){var d=document.getElementById('log');d.innerHTML+='<div class="'+(cls||'')+'">'+msg+'</div>';d.scrollTop=d.scrollHeight;}
function setBar(p){document.getElementById('barFill').style.width=p+'%';}

function geocodeOne(placeSearch, geocoder, mall){
  return new Promise(function(resolve){
    if(mall.manual){ resolve({lng:mall.manual[0],lat:mall.manual[1],addr:'(手动坐标)'}); return; }
    placeSearch.search(mall.searchKw, function(status,result){
      if(status==='complete' && result.poiList && result.poiList.pois && result.poiList.pois.length){
        var p=result.poiList.pois[0];
        resolve({lng:p.location.lng,lat:p.location.lat,addr:(p.cityname||'')+(p.adname||'')+(p.address||'')});
      } else {
        // 退回地理编码
        geocoder.getLocation(mall.name+' 北京', function(s2,r2){
          if(s2==='complete'&&r2.geocodes&&r2.geocodes.length){
            var g=r2.geocodes[0];
            resolve({lng:g.location.lng,lat:g.location.lat,addr:g.formattedAddress});
          } else resolve(null);
        });
      }
    });
  });
}

function run(){
  document.getElementById('startBtn').disabled=true;
  if(typeof AMap==='undefined'||!AMap.PlaceSearch){ log('高德未加载，请刷新重试','err'); return; }
  var placeSearch=new AMap.PlaceSearch({city:'北京',citylimit:true,pageSize:1});
  var geocoder=new AMap.Geocoder({city:'北京'});
  var malls=DATA.malls, done=0, results=[];
  log('开始处理 '+malls.length+' 个场地...');
  (function next(i){
    if(i>=malls.length){ finish(results); return; }
    var m=malls[i];
    geocodeOne(placeSearch,geocoder,m).then(function(loc){
      done++; setBar(Math.round(done/malls.length*100));
      var mall={
        id:m.id,name:m.name,district:m.district,
        address:loc?loc.addr:'(未定位，请手动)',
        lng:loc?(+loc.lng).toFixed(4):'',lat:loc?(+loc.lat).toFixed(4):'',
        quality:m.quality,firstCoop:m.firstCoop,coopCount:m.coopCount,
        fixedSchedule:m.fixedSchedule,scheduledDatesList:m.scheduledDatesList,
        venueType:m.venueType,notes:m.notes
      };
      results.push(mall);
      if(loc) log('✓ '+m.name+'  → '+mall.lng+','+mall.lat,'ok');
      else log('✗ '+m.name+'  未能定位，已留空坐标（导入后请手动补）','warn');
      setTimeout(function(){next(i+1);}, 250);
    });
  })(0);
}

function finish(malls){
  // 写入场地
  localStorage.setItem(STORAGE_KEY, JSON.stringify(malls));
  // 写入过往活动
  localStorage.setItem(PAST_KEY, JSON.stringify(DATA.past));
  var noCoord=malls.filter(function(m){return !m.lng;}).length;
  log('————————————','');
  log('✅ 完成！写入 '+malls.length+' 个场地、'+DATA.past.length+' 条过往活动。','ok');
  if(noCoord) log('⚠ 有 '+noCoord+' 个场地未能自动定位，打开地图后用编辑功能手动补坐标。','warn');
  document.getElementById('log').innerHTML+='<a class="gobtn" href="index.html">→ 打开地图查看</a>';
}
